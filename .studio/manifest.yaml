    status: pending
  hermes:
    enabled: true
    output-paths:
      - AGENTS.md
      - .hermes/
    adapter-script: tools/adapters/sync-hermes.sh
    status: pending
  workbuddy:
    enabled: true
    output-paths:
      - AGENTS.md
      - .workbuddy/
